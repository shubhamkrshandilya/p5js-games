<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glassmorphic 2048 - Classic Retro Arcade</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Press+Start+2P&display=swap" rel="stylesheet">
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Style Sheet -->
    <link rel="stylesheet" href="style.css">
    <!-- p5.js Core -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
</head>
<body>
    <div class="game-wrapper">
        <!-- Main Game Workspace -->
        <main class="workspace">
            <!-- Left Sidebar -->
            <div class="side-hud left-hud glass">
                <div class="hud-box score-box">
                    <h4>SCORE</h4>
                    <span class="hud-value" id="score-val">0</span>
                </div>
                <div class="hud-box best-box">
                    <h4>BEST</h4>
                    <span class="hud-value" id="best-val">0</span>
                </div>
            </div>

            <!-- Central Canvas Viewport -->
            <div class="canvas-container glass" id="canvas-parent">
                <div class="mode-badge"><i class="fa-solid fa-calculator"></i> GLASS 2048</div>
                
                <!-- Game Over Overlay -->
                <div class="game-over-overlay" id="game-over-screen">
                    <h2 class="retro-blink" id="game-over-title">GAME OVER</h2>
                    <p>Final Score: <span id="final-score">0</span></p>
                    <button class="btn btn-primary" id="restart-btn-over"><i class="fa-solid fa-arrows-rotate"></i> PLAY AGAIN</button>
                </div>
            </div>

            <!-- Right Sidebar -->
            <div class="side-hud right-hud glass">
                <button class="btn btn-action" id="undo-btn">
                    <i class="fa-solid fa-rotate-left"></i> UNDO
                </button>
                <button class="btn btn-primary" id="restart-btn">
                    <i class="fa-solid fa-arrows-rotate"></i> RESTART
                </button>
                <div class="hud-box guide-box">
                    <h4>GUIDE</h4>
                    <p class="guide-text">Swipe or use Arrow keys to merge tiles. Reach 2048!</p>
                </div>
            </div>
        </main>

        <!-- Mobile Touch Controls Layout Overlay -->
        <div class="mobile-controls-bar">
            <button class="control-btn" id="ctrl-left" aria-label="Slide Left"><i class="fa-solid fa-arrow-left"></i></button>
            <button class="control-btn" id="ctrl-up" aria-label="Slide Up"><i class="fa-solid fa-arrow-up"></i></button>
            <button class="control-btn" id="ctrl-down" aria-label="Slide Down"><i class="fa-solid fa-arrow-down"></i></button>
            <button class="control-btn" id="ctrl-right" aria-label="Slide Right"><i class="fa-solid fa-arrow-right"></i></button>
            <button class="control-btn" id="ctrl-undo" aria-label="Undo last move"><i class="fa-solid fa-rotate-left"></i></button>
        </div>
    </div>

    <!-- Simulation Code -->
    <script src="sketch.js"></script>
</body>
</html>
